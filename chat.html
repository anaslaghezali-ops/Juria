<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Juridique - Juria</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .container { display: flex; height: 100vh; }
    .sidebar { width: 300px; background: #fff; border-right: 1px solid #e0e0e0; padding: 20px; overflow-y: auto; }
    .sidebar h2 { font-size: 14px; color: #666; margin-bottom: 15px; text-transform: uppercase; }
    .doc-info { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .doc-info .name { font-weight: 600; font-size: 14px; margin-bottom: 8px; word-break: break-word; }
    .doc-info .meta { font-size: 12px; color: #888; }
    .doc-info .meta div { margin: 4px 0; }
    .main { flex: 1; display: flex; flex-direction: column; }
    .header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 20px; }
    .header-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .header-hint { font-size: 13px; color: #888; }
    .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .message { display: flex; gap: 12px; max-width: 80%; }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; max-width: 85%; }
    .message-bubble { padding: 12px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
    .message.user .message-bubble { background: #5b35ff; color: white; }
    .message.assistant .message-bubble { background: #f0f0f0; color: #333; }
    .citation { font-size: 12px; color: #888; margin-top: 8px; padding-top: 8px; border-top: 1px solid #e0e0e0; }
    .input-area { background: #fff; border-top: 1px solid #e0e0e0; padding: 20px; display: flex; gap: 10px; }
    .input-area input { flex: 1; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
    .input-area button { padding: 12px 24px; background: #5b35ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .input-area button:hover { background: #4a2ad1; }
    .input-area button:disabled { background: #ccc; cursor: not-allowed; }
    .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #ddd; border-top-color: #5b35ff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <h2>Document</h2>
    <div class="doc-info">
      <div class="name" id="docName">—</div>
      <div class="meta">
        <div>Score: <span id="docScore">—</span>/10</div>
        <div>Risque: <span id="docRisk">—</span></div>
        <div>Chunks: <span id="docChunks">—</span></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <div class="header-title">Chat Juridique</div>
      <div class="header-hint">Posez vos questions sur le document. Les réponses seront basées sur son contenu.</div>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-area">
      <input type="text" id="questionInput" placeholder="Ex: Quel est le préavis ? Qui sont les parties ?" />
      <button id="sendBtn" onclick="sendQuestion()">Envoyer</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://dnrudcpaqcqyybpbbrum.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRucnVkY3BhcWNxeXlicGJicnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MDc5NTEsImV4cCI6MjA5Njk4Mzk1MX0.P3TDMmlt467p-oBRR8F8RMnCcbqMD7H1hFOmPOLBOOI';
const OPENAI_API_KEY = 'sk-proj-KV7HvFhjV1OVqkHFEwKFU7jkI7jzfKjVKXiCN7EjPwM-j7tqLvD5xS3CJKnKMbDvDkVhbUdbP-T03BlbkFJ7pVGmLs_jkEu3bpEaIDYEJ6nDzVFvWc7lZyG-s-0n7sJJnBn_9xr9oeB5_02YDDY-95EnBxkA';

const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentDocId = null;

async function init() {
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) {
    await new Promise(r => setTimeout(r, 800));
    const { data: { session: session2 } } = await _sb.auth.getSession();
    if (!session2) { window.location.href = 'auth.html'; return; }
  }

  const docId = new URLSearchParams(window.location.search).get('id');
  if (!docId) { alert('Document manquant'); return; }
  currentDocId = docId;

  const { data: doc, error } = await _sb.from('documents').select('*').eq('id', docId).single();
  if (!doc) { alert('Document introuvable : ' + (error?.message || '')); return; }

  document.getElementById('docName').textContent = doc.name;
  document.getElementById('docScore').textContent = doc.compliance_score || '—';
  document.getElementById('docRisk').textContent = doc.risk_level || '—';

  const { count } = await _sb.from('document_chunks').select('*', { count: 'exact' })
    .eq('document_id', docId).eq('indexing_status', 'done');
  document.getElementById('docChunks').textContent = count || 0;

  document.getElementById('questionInput').focus();
}

async function sendQuestion() {
  const question = document.getElementById('questionInput').value.trim();
  if (!question) return;

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  try {
    addMessage('user', question);
    document.getElementById('questionInput').value = '';

    // 1. Embedding de la question via OpenAI
    const questionEmbedding = await getEmbedding(question);

    // 2. Recherche vectorielle des chunks similaires
    const { data: similarChunks, error: rpcError } = await _sb
      .rpc('match_document_chunks', {
        document_id: currentDocId,
        query_embedding: questionEmbedding,
        match_count: 5
      });

    if (rpcError) throw new Error('Erreur recherche : ' + rpcError.message);

    if (!similarChunks || similarChunks.length === 0) {
      addMessage('assistant', '❌ Aucun passage pertinent trouvé. Le document est peut-être en cours d\'indexation, réessayez dans quelques secondes.');
      return;
    }

    // 3. Construire le contexte
    const context = similarChunks
      .map((c, i) => `[Passage ${i+1} - Page ${c.page_number || '?'}]\n${c.content}`)
      .join('\n\n---\n\n');

    // 4. Appeler Claude via Edge Function (sécurisé)
    addMessage('assistant', '<div class="loading"></div>');

    const { data: { session } } = await _sb.auth.getSession();
    const response = await fetch(`${SUPABASE_URL}/functions/v1/chat-with-doc`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`
      },
      body: JSON.stringify({ question, context })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Erreur Edge Function');

    removeLastMessage();
    addMessage('assistant', data.answer + '<div class="citation">📍 Basé sur ' + similarChunks.length + ' passage(s) du document</div>');

  } catch (e) {
    removeLastMessage();
    addMessage('assistant', '❌ ' + e.message);
    console.error(e);
  } finally {
    sendBtn.disabled = false;
  }
}

async function getEmbedding(text) {
  const res = await fetch('https://api.openai.com/v1/embeddings', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${OPENAI_API_KEY}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ model: 'text-embedding-3-small', input: text })
  });
  const data = await res.json();
  if (!res.ok) throw new Error('Erreur embedding: ' + data.error?.message);
  return data.data[0].embedding;
}

function addMessage(role, content) {
  const chatArea = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = 'message ' + role;
  msg.innerHTML = '<div class="message-bubble">' + content + '</div>';
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeLastMessage() {
  const chatArea = document.getElementById('chatArea');
  if (chatArea.lastChild) chatArea.lastChild.remove();
}

document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && e.target.id === 'questionInput') {
    e.preventDefault();
    sendQuestion();
  }
});

init();
</script>

</body>
</html>
