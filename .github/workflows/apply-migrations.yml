name: Apply Database Migrations

# Applique les migrations SQL via l'API de management Supabase
# (mêmes secrets que le déploiement des edge functions).
#
# ⚠️ N'exécute QUE les fichiers listés dans PENDING_MIGRATIONS (ou l'input
# manuel) : les migrations 01-05 ont été appliquées à la main et ne sont pas
# toutes idempotentes. Toute nouvelle migration ajoutée ici DOIT être
# idempotente (IF NOT EXISTS / OR REPLACE / ON CONFLICT).

on:
  workflow_dispatch:
    inputs:
      files:
        description: "Fichiers à appliquer (séparés par des espaces), relatifs à supabase/migrations/"
        required: false
        default: ""
  push:
    branches:
      - main
      - claude/juria-code-analysis-qen2o7
    paths:
      - '.github/workflows/apply-migrations.yml'

env:
  PENDING_MIGRATIONS: "12_document_obligations.sql 13_folder_sharing.sql 14_performance_indexes.sql 15_sharing_notifications.sql 16_fix_insert_returning_rls.sql 17_counterparty_compartmentalization.sql 18_counterparty_sharing.sql 19_fk_indexes.sql"

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply migrations via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          INPUT_FILES: ${{ github.event.inputs.files }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "❌ Secrets manquants : SUPABASE_ACCESS_TOKEN et SUPABASE_PROJECT_ID"
            exit 1
          fi

          FILES="${INPUT_FILES:-$PENDING_MIGRATIONS}"
          echo "🗃  Migrations à appliquer : $FILES"
          FAILED=0

          for f in $FILES; do
            path="supabase/migrations/$f"
            if [ ! -f "$path" ]; then
              echo "❌ Fichier introuvable : $path"
              FAILED=1
              continue
            fi

            echo ""
            echo "▶ Applying $f ..."
            jq -Rs '{query: .}' "$path" > /tmp/payload.json

            HTTP_CODE=$(curl -sS -o /tmp/response.json -w "%{http_code}" \
              -X POST "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/database/query" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              --data @/tmp/payload.json)

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "  ✅ $f applied (HTTP $HTTP_CODE)"
            else
              echo "  ❌ $f FAILED (HTTP $HTTP_CODE)"
              FAILED=1
            fi
            # Toujours afficher la réponse (résultats des SELECT des fichiers diag_*)
            jq . /tmp/response.json 2>/dev/null | head -c 24000 || cat /tmp/response.json
          done

          exit $FAILED

      - name: Verify quota schema
        if: success()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          echo '{"query": "select (select count(*) from operation_costs) as operation_costs, (select count(*) from superadmins) as superadmins, (select count(*) from information_schema.columns where table_name = '"'"'organizations'"'"' and column_name = '"'"'monthly_quota'"'"') as monthly_quota_col;"}' > /tmp/verify.json
          curl -sS -X POST "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data @/tmp/verify.json
          echo ""
          echo "Attendu : operation_costs=4, superadmins=1 (si le compte fondateur existe), monthly_quota_col=1"
