name: DB Query (diagnostic)

# Outil de diagnostic : exécute une requête SQL (lecture) via l'API de
# management Supabase et affiche le résultat dans les logs du run.
# Mêmes secrets que apply-migrations.yml. Réservé au debugging —
# déclenchement manuel uniquement (workflow_dispatch), accès collaborateur.

on:
  workflow_dispatch:
    inputs:
      query:
        description: "Requête SQL à exécuter (SELECT de diagnostic)"
        required: true

jobs:
  query:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Run query via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          QUERY: ${{ github.event.inputs.query }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "❌ Secrets manquants : SUPABASE_ACCESS_TOKEN et SUPABASE_PROJECT_ID"
            exit 1
          fi

          jq -n --arg q "$QUERY" '{query: $q}' > /tmp/payload.json

          HTTP_CODE=$(curl -sS -o /tmp/response.json -w "%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data @/tmp/payload.json)

          echo "HTTP $HTTP_CODE"
          echo "── Résultat ──────────────────────────────────────"
          jq . /tmp/response.json || cat /tmp/response.json
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]
