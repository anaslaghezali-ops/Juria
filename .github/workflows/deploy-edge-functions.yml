name: Deploy Edge Functions

on:
  push:
    branches:
      - main
      - claude/juria-code-analysis-qen2o7
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        run: |
          npm install -g supabase

      - name: Deploy Edge Functions to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase functions deploy smart-endpoint \
            --project-ref $SUPABASE_PROJECT_ID

      - name: Verify deployment
        run: |
          echo "✅ Edge Functions deployed successfully"
          echo "Function URL: https://${{ secrets.SUPABASE_PROJECT_ID }}.supabase.co/functions/v1/smart-endpoint"

      - name: Notify deployment
        if: success()
        run: |
          echo "🎉 Deployment completed successfully"
          echo "Deployed to: Production"
