name: Deploy Edge Functions

on:
  workflow_dispatch:   # déclenchement manuel depuis l'onglet Actions
  push:
    branches:
      - main
      - claude/juria-code-analysis-qen2o7
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        run: |
          npm install -g supabase

      - name: Deploy Edge Functions to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          # Échec bruyant si les secrets manquent : un déploiement qui ne
          # déploie rien ne doit JAMAIS être vert.
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "❌ Secrets manquants : configurez SUPABASE_ACCESS_TOKEN et SUPABASE_PROJECT_ID"
            echo "   GitHub → Settings → Secrets and variables → Actions"
            echo "   Token : https://supabase.com/dashboard/account/tokens"
            exit 1
          fi

          FAILED=0
          echo "🚀 Deploying Edge Functions..."
          echo ""

          # Fonctions protégées par JWT (appelées avec le token de session)
          # NB : generate-embeddings n'est PAS listée — son source n'existe
          # pas dans le repo (déployée historiquement via le dashboard).
          FUNCTIONS=(
            "smart-endpoint"
            "chat-with-doc"
            "embed-articles"
            "generate-keywords"
            "get-embedding"
            "get-remaining-quota"
            "process-chunks"
            "vector-search"
            "generate-synthesis"
            "superadmin"
          )

          # Fonctions SANS vérification JWT : appelées pendant le signup,
          # avant qu'une session existe (sécurisées par SERVICE_ROLE_KEY côté serveur)
          NO_JWT_FUNCTIONS=(
            "invite-user"
            "link-user-to-org"
          )

          for func in "${FUNCTIONS[@]}"; do
            echo "  Deploying $func..."
            supabase functions deploy "$func" --project-ref $SUPABASE_PROJECT_ID || { echo "  ❌ $func deploy failed"; FAILED=1; }
          done

          for func in "${NO_JWT_FUNCTIONS[@]}"; do
            echo "  Deploying $func (no JWT verification)..."
            supabase functions deploy "$func" --no-verify-jwt --project-ref $SUPABASE_PROJECT_ID || { echo "  ❌ $func deploy failed"; FAILED=1; }
          done

          exit $FAILED

      - name: Verify deployment
        run: |
          echo "✅ Edge Functions deployed successfully!"
          echo ""
          echo "Available functions:"
          echo "  1. smart-endpoint - AI-powered legal document analysis + quota management"
          echo "  2. chat-with-doc - GPT-powered legal document chat (classifier, summary, global analysis)"
          echo "  3. embed-articles - Batch generate embeddings for legal articles"
          echo "  4. generate-embeddings - Generate embeddings (alternate)"
          echo "  5. generate-keywords - Extract and enrich keywords from articles"
          echo "  6. get-embedding - Get embedding for arbitrary text"
          echo "  7. process-chunks - Process document chunks with embeddings"
          echo "  8. vector-search - Semantic search with vector queries"

      - name: Notify deployment
        if: success()
        run: |
          echo "🎉 Deployment completed successfully"
          echo "Deployed to: Production"
